<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StudyLayer Dashboard - Your intelligent learning companion for mastering any subject with spaced repetition." />
    <meta name="theme-color" content="#0ea5e9" />
    <title>StudyLayer Dashboard</title>
    <!-- Prevent flash of unstyled content on theme load -->
    <script>
      (function() {
        const theme = localStorage.getItem('studylayer-theme') || 'system';
        let resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
